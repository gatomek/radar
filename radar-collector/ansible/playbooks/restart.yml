- name: "Restart service {{app_name}} on kamatera"
  vars_files:
    - vars/prod.yml
  gather_facts: no
  hosts: kamatera
  remote_user: "{{remote_admin}}"
  become: true
  become_method: sudo
  tasks:
    - name: "Restart service {{app_name}}"
      systemd:
        state: restarted
        name: "{{app_name}}"
