- name: "Set up service {{app_name}} on kamatera"
  vars_files:
    - vars/prod.yml
  gather_facts: no
  hosts: kamatera
  remote_user: "{{remote_admin}}"
  become: true
  become_method: sudo
  tasks:
    - name: "Creating user {{app_name}}"
      user:
        name: "{{app_name}}"
        shell: /bin/false
        system: true
        password: "{{user_password | password_hash('sha512') }}"
        state: present

    - name: "Create app folder /usr/local/{{app_name}}"
      file:
        path: "/usr/local/{{app_name}}"
        state: directory
        owner: "{{app_name}}"
        group: "{{app_name}}"
        mode: '0700'

    - name: "Copy app to /usr/local/{{app_name}}/"
      copy:
        src: "../../target/{{app_name}}.jar"
        dest: "/usr/local/{{app_name}}/{{app_name}}.jar"
        owner: "{{app_name}}"
        group: "{{app_name}}"

    - name: "Render systemd service-template.service config file to /etc/systemd/system/{{app_name}}.service"
      template:
        src: data/service-template.service
        dest: "/etc/systemd/system/{{app_name}}.service"
        owner: root
        group: root

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: "Start service {{app_name}}"
      systemd:
        name: "{{app_name}}"
        state: started
        enabled: true
